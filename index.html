<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Yu-Gi-Oh! Duel Infinity - Main Menu</title>
  <style>
    :root {
      color-scheme: dark;
      --menu-width: min(92vw, 420px);
      --button-height: clamp(52px, 8.5vh, 68px);
      --button-gap: clamp(10px, 1.8vh, 16px);
      --panel-bg: rgba(6, 10, 26, 0.75);
      --panel-border: rgba(157, 203, 255, 0.4);
      --button-bg: linear-gradient(180deg, rgba(69, 125, 255, 0.9), rgba(17, 48, 142, 0.95));
      --button-bg-hover: linear-gradient(180deg, rgba(121, 164, 255, 0.95), rgba(37, 77, 201, 0.98));
      --button-shadow: 0 8px 20px rgba(9, 18, 54, 0.45);
      --text-main: #eff6ff;
      --text-subtle: #c6dafd;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", Arial, sans-serif;
      color: var(--text-main);
      background: #050816;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(12px, env(safe-area-inset-top)) 14px max(12px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 20% 15%, rgba(76, 134, 255, 0.45), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(95, 19, 255, 0.25), transparent 50%),
        linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.65)),
        url("skybox.jpg") center / cover no-repeat fixed;
    }

    .menu-shell {
      width: var(--menu-width);
      max-height: 100%;
      border-radius: 22px;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(18px, 3vh, 30px);
      gap: clamp(14px, 2vh, 20px);
    }

    .game-logo {
      width: min(68vw, 280px);
      max-height: 20vh;
      object-fit: contain;
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.6));
    }

    .menu-title {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: clamp(0.8rem, 1.8vw, 0.95rem);
      color: var(--text-subtle);
    }

    .main-menu {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--button-gap);
    }

    .menu-button {
      width: 100%;
      min-height: var(--button-height);
      border: 1px solid rgba(195, 223, 255, 0.4);
      border-radius: 14px;
      padding: 0 16px;
      background: var(--button-bg);
      color: var(--text-main);
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: var(--button-shadow);
      transition: transform 0.15s ease, filter 0.15s ease, background 0.15s ease;
    }

    .menu-button:hover,
    .menu-button:focus-visible {
      background: var(--button-bg-hover);
      transform: translateY(-2px);
      filter: brightness(1.05);
      outline: none;
    }

    .menu-button:active {
      transform: translateY(1px) scale(0.99);
    }

    .menu-footer {
      margin: 0;
      font-size: clamp(0.75rem, 1.8vw, 0.85rem);
      color: rgba(222, 237, 255, 0.75);
      text-align: center;
    }

    @media (max-width: 360px), (max-height: 640px) {
      :root {
        --button-height: clamp(44px, 8vh, 52px);
      }

      .menu-shell {
        gap: 10px;
        padding: 14px;
      }

      .menu-title {
        font-size: 0.72rem;
      }

      .menu-button {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <main class="menu-shell" aria-label="Main menu">
    <img class="game-logo" src="logo.png" alt="Yu-Gi-Oh Duel Infinity logo" />
    <h1 class="menu-title">Main Menu</h1>

    <nav class="main-menu" aria-label="Primary navigation">
      <button class="menu-button" type="button">Start Duel</button>
      <button class="menu-button" type="button">Campaign</button>
      <button class="menu-button" type="button">Deck Builder</button>
      <button class="menu-button" type="button">Card Shop</button>
      <button class="menu-button" type="button">Settings</button>
      <button class="menu-button" type="button">Credits</button>
    </nav>

    <p class="menu-footer">Tap a mode to continue</p>
  </main>
</body>
</html>
